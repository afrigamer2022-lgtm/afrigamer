<html lang="en">
<head>

  <head>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BVKLZNE7DX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BVKLZNE7DX');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
      --border: #2a2a2a; --accent: #f5a623; --text: #f0ede8; --muted: #888;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 6px; transition: color 0.2s, background 0.2s; }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent); }
    .hero { background: linear-gradient(135deg, #1a1200 0%, #0d0d0d 60%); border-bottom: 1px solid #3a2800; padding: 3rem 1.5rem; position: relative; overflow: hidden; }
    .hero::before { content: '🌍'; position: absolute; right: 2rem; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.1; pointer-events: none; }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero h1 { font-family: var(--font-head); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.75rem; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 1rem; max-width: 520px; line-height: 1.7; margin-bottom: 1.5rem; }
    .submit-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--accent); color: #000; padding: 0.65rem 1.5rem; border-radius: 8px; font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.85; }
    .section { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section h2 { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; text-decoration: none; color: inherit; transition: transform 0.2s, border-color 0.2s; display: block; }
    .game-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .game-thumb { width: 100%; aspect-ratio: 4/3; background: var(--surface2); position: relative; overflow: hidden; }
    .game-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .game-card:hover .game-thumb img { transform: scale(1.05); }
    .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .game-card:hover .play-overlay { opacity: 1; }
    .play-overlay svg { color: #fff; }
    .africa-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: #000; font-size: 0.6rem; font-weight: 700; padding: 0.2rem 0.45rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .game-info { padding: 0.6rem 0.75rem 0.75rem; }
    .game-info h3 { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.2rem; }
    .game-info .game-cat { font-size: 0.75rem; color: var(--muted); text-transform: capitalize; }
    .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); grid-column: 1/-1; }
    .empty h3 { font-family: var(--font-head); font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
    .empty p { font-size: 0.9rem; max-width: 380px; margin: 0 auto 1.5rem; }
    .empty a { display: inline-block; background: var(--accent); color: #000; padding: 0.6rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 700; font-family: var(--font-head); }
    footer { margin-top: 4rem; border-top: 1px solid var(--border); padding: 2rem 1.5rem; text-align: center; color: var(--muted); font-size: 0.82rem; }
    footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 600px) { .nav-links { display: none; } .hero::before { display: none; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Afri<span>Gamer</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="africa.html" class="active">Made in Africa</a>
    </div>
  </nav>
  <div class="hero">
    <div class="hero-inner">
      <h1>Games <span>Made in Africa</span></h1>
      <p>Showcasing games built by African developers. From Nairobi to Lagos, Cairo to Cape Town — this is African talent on display.</p>
      <a href="mailto:submit@afrigamer.com" class="submit-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Submit Your Game
      </a>
    </div>
  </div>
  <div class="section">
    <h2>African-Made Games</h2>
    <div class="game-grid" id="africaGrid"></div>
  </div>
  <footer>
    <p>© 2025 AfriGamer &nbsp;·&nbsp; <a href="mailto:submit@afrigamer.com">Submit Your Game</a></p>
  </footer>
  <script src="js/games.js"></script>
  <script>
    const grid = document.getElementById('africaGrid');
    const africanGames = GAMES.filter(g => g.madeInAfrica);
    if (africanGames.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <h3>Coming soon</h3>
          <p>We're currently onboarding African developers. Are you building a game? We'd love to feature it.</p>
          <a href="mailto:submit@afrigamer.com">Get Featured</a>
        </div>`;
    } else {
      africanGames.forEach(game => {
        const a = document.createElement('a');
        a.href = `game.html?id=${game.id}`;
        a.className = 'game-card';
        a.innerHTML = `
          <div class="game-thumb">
            <img src="${game.thumbnail}" alt="${game.title}" loading="lazy" onerror="this.src='https://placehold.co/320x240/1f1f1f/888?text=${encodeURIComponent(game.title)}'"/>
            <div class="play-overlay">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="africa-badge">🌍 Africa</div>
          </div>
          <div class="game-info">
            <h3>${game.title}</h3>
            <div class="game-cat">${game.category[0]}</div>
          </div>`;
        grid.appendChild(a);
      });
    }
  </script>
</body>
</html>
